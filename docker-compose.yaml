version: "3.9"

services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-net
    restart: always

  flask-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: secret
      DB_NAME: myapp
    depends_on:
      - postgres-db
    networks:
      - app-net
    restart: always

volumes:
  pg-data:

networks:
  app-net: